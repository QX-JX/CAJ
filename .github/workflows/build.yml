name: Build CAJ Converter for Linux and macOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyInstaller PyQt6 PyPDF2 pdf2docx Pillow pymupdf python-docx reportlab
    
    - name: Build Linux version
      run: |
        python -m PyInstaller --name=CAJConverter --windowed --onedir --icon=CAJ转换器.ico --noconfirm --clean --add-data=lib:lib --add-data=鲲穹01.ico:. --add-data=CAJ转换器.ico:. --add-data=locales:locales --hidden-import=PyQt6 --hidden-import=PyQt6.QtWidgets --hidden-import=PyQt6.QtCore --hidden-import=PyQt6.QtGui --hidden-import=PyPDF2 --hidden-import=pdf2docx --hidden-import=PIL --hidden-import=PIL.Image --hidden-import=fitz --hidden-import=pymupdf --hidden-import=docx --hidden-import=docx.document --hidden-import=docx.oxml --hidden-import=reportlab --hidden-import=reportlab.pdfgen --hidden-import=reportlab.lib --hidden-import=reportlab.lib.pagesizes --hidden-import=reportlab.lib.units --collect-all=PyQt6 --collect-all=fitz --collect-all=docx --collect-all=reportlab main.py
    
    - name: Create artifact
      run: |
        cd dist
        tar -czf CAJConverter_Linux.tar.gz CAJConverter
    
    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: CAJConverter_Linux
        path: dist/CAJConverter_Linux.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyInstaller PyQt6 PyPDF2 pdf2docx Pillow pymupdf python-docx reportlab
    
    - name: Build macOS version
      run: |
        python -m PyInstaller --name=CAJConverter --windowed --onedir --icon=CAJ转换器.ico --noconfirm --clean --add-data=lib:lib --add-data=鲲穹01.ico:. --add-data=CAJ转换器.ico:. --add-data=locales:locales --hidden-import=PyQt6 --hidden-import=PyQt6.QtWidgets --hidden-import=PyQt6.QtCore --hidden-import=PyQt6.QtGui --hidden-import=PyPDF2 --hidden-import=pdf2docx --hidden-import=PIL --hidden-import=PIL.Image --hidden-import=fitz --hidden-import=pymupdf --hidden-import=docx --hidden-import=docx.document --hidden-import=docx.oxml --hidden-import=reportlab --hidden-import=reportlab.pdfgen --hidden-import=reportlab.lib --hidden-import=reportlab.lib.pagesizes --hidden-import=reportlab.lib.units --collect-all=PyQt6 --collect-all=fitz --collect-all=docx --collect-all=reportlab main.py
    
    - name: Create artifact
      run: |
        cd dist
        tar -czf CAJConverter_macOS.tar.gz CAJConverter.app
    
    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: CAJConverter_macOS
        path: dist/CAJConverter_macOS.tar.gz