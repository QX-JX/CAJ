name: Build CAJ Converter for macOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos-intel:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt PyInstaller PyPDF2

      - name: Prepare macOS icon
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image

          root = Path.cwd()
          output_dir = root / "build_assets"
          iconset_dir = output_dir / "CAJConverter.iconset"
          output_dir.mkdir(exist_ok=True)
          iconset_dir.mkdir(exist_ok=True)

          sizes = [16, 32, 64, 128, 256, 512]
          with Image.open(root / "CAJ转换器.ico") as icon:
              for size in sizes:
                  resized = icon.resize((size, size))
                  resized.save(iconset_dir / f"icon_{size}x{size}.png")
                  resized_2x = icon.resize((size * 2, size * 2))
                  resized_2x.save(iconset_dir / f"icon_{size}x{size}@2x.png")
          PY
          iconutil -c icns build_assets/CAJConverter.iconset -o build_assets/CAJConverter.icns

      - name: Build macOS Intel version
        env:
          CI_APP_ICON: ${{ github.workspace }}/build_assets/CAJConverter.icns
          CI_TARGET_ARCH: x86_64
        run: python build_ci.py

      - name: Create Intel artifact
        run: |
          cd dist
          tar -czf CAJConverter_macOS_Intel.tar.gz CAJConverter.app

      - name: Upload macOS Intel artifact
        uses: actions/upload-artifact@v4
        with:
          name: CAJConverter_macOS_Intel
          path: dist/CAJConverter_macOS_Intel.tar.gz

  build-macos-apple-silicon:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt PyInstaller PyPDF2

      - name: Prepare macOS icon
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image

          root = Path.cwd()
          output_dir = root / "build_assets"
          iconset_dir = output_dir / "CAJConverter.iconset"
          output_dir.mkdir(exist_ok=True)
          iconset_dir.mkdir(exist_ok=True)

          sizes = [16, 32, 64, 128, 256, 512]
          with Image.open(root / "CAJ转换器.ico") as icon:
              for size in sizes:
                  resized = icon.resize((size, size))
                  resized.save(iconset_dir / f"icon_{size}x{size}.png")
                  resized_2x = icon.resize((size * 2, size * 2))
                  resized_2x.save(iconset_dir / f"icon_{size}x{size}@2x.png")
          PY
          iconutil -c icns build_assets/CAJConverter.iconset -o build_assets/CAJConverter.icns

      - name: Build macOS Apple Silicon version
        env:
          CI_APP_ICON: ${{ github.workspace }}/build_assets/CAJConverter.icns
          CI_TARGET_ARCH: arm64
        run: python build_ci.py

      - name: Create Apple Silicon artifact
        run: |
          cd dist
          tar -czf CAJConverter_macOS_AppleSilicon.tar.gz CAJConverter.app

      - name: Upload macOS Apple Silicon artifact
        uses: actions/upload-artifact@v4
        with:
          name: CAJConverter_macOS_AppleSilicon
          path: dist/CAJConverter_macOS_AppleSilicon.tar.gz
